<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KnowledgeKeeper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c0e; --surface: #141416; --surface2: #1c1c1f; --surface3: #242428;
      --border: #2a2a2f; --text: #f0f0f0; --text2: #999; --text3: #666;
      --accent: #c8f55a; --accent-dim: rgba(200,245,90,0.12); --accent-dim2: rgba(200,245,90,0.06);
      --red: #ff5c5c; --yellow: #FFE066; --blue: #60a5fa;
      --radius: 10px; --radius-sm: 6px;
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body { font-family: 'DM Sans', sans-serif; color: var(--text); font-size: 13px; display: flex; flex-direction: column; }

    .header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon { width: 26px; height: 26px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .logo-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: -0.02em; }
    .header-actions { display: flex; gap: 6px; }
    .icon-btn { width: 30px; height: 30px; border: 1px solid var(--border); background: var(--surface2); border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; color: var(--text2); }
    .icon-btn:hover { background: var(--surface3); color: var(--text); }
    .search-wrap { position: relative; }
    .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
    #searchInput { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 10px 7px 32px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; }
    #searchInput::placeholder { color: var(--text3); }
    #searchInput:focus { border-color: var(--accent); }

    .tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg); }
    .tab { flex: 1; padding: 9px 4px; border: none; background: none; color: var(--text3); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .tab:hover { color: var(--text2); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .toolbar { display: flex; gap: 6px; padding: 8px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface); flex-wrap: wrap; }
    .tool-btn { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .tool-btn:hover { background: var(--surface3); color: var(--text); }
    .tool-btn.primary { background: var(--accent); border-color: var(--accent); color: #0c0c0e; }
    .tool-btn.primary:hover { opacity: 0.88; }
    .tool-btn.danger:hover { border-color: var(--red); color: var(--red); }
    .tool-btn.hl-active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .color-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid rgba(255,255,255,0.2); cursor: pointer; flex-shrink: 0; align-self: center; }

    .content { flex: 1; overflow-y: auto; padding: 12px 16px; }
    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; gap: 12px; text-align: center; }
    .empty-icon { width: 48px; height: 48px; border-radius: 12px; background: var(--surface2); display: flex; align-items: center; justify-content: center; }
    .empty-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; }
    .empty-sub { color: var(--text3); font-size: 12px; line-height: 1.6; max-width: 200px; }

    .item-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; position: relative; }
    .item-card:hover { border-color: #3a3a40; background: var(--surface2); }
    .item-card:hover .card-actions { opacity: 1; }
    .card-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
    .card-favicon { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; margin-top: 1px; }
    .card-title { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 12px; color: var(--text); line-height: 1.4; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-type-badge { font-size: 9px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
    .badge-page { background: rgba(96,165,250,0.15); color: var(--blue); }
    .badge-highlight { background: rgba(255,224,102,0.15); color: var(--yellow); }
    .badge-note { background: rgba(200,245,90,0.15); color: var(--accent); }
    .badge-keypoints { background: rgba(167,139,250,0.15); color: #a78bfa; }
    .card-keypoints { list-style: none; padding: 0; margin-bottom: 6px; }
    .card-keypoints li { color: var(--text2); font-size: 12px; line-height: 1.5; padding: 2px 0 2px 14px; position: relative; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-keypoints li::before { content: "•"; position: absolute; left: 0; color: #a78bfa; }
    .card-keypoints li.kp-more { color: var(--text3); font-style: italic; }
    .card-text { color: var(--text2); font-size: 12px; line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 6px; }
    .card-text.highlight-text { border-left: 2px solid; padding-left: 8px; font-style: italic; }
    .card-meta { display: flex; gap: 8px; align-items: center; }
    .card-url { color: var(--text3); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .card-time { color: var(--text3); font-size: 11px; flex-shrink: 0; }
    .card-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
    .card-action-btn { width: 24px; height: 24px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface3); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); transition: all 0.12s; }
    .card-action-btn:hover { background: var(--bg); color: var(--text); }
    .card-action-btn.del:hover { border-color: var(--red); color: var(--red); }
    .card-note { margin-top: 6px; padding: 6px 8px; background: var(--surface3); border-radius: 5px; color: var(--text2); font-size: 11px; line-height: 1.5; font-style: italic; }
    .card-summary { margin-top: 6px; padding: 6px 8px; background: var(--accent-dim2); border-radius: 5px; border-left: 2px solid var(--accent); color: var(--text2); font-size: 11px; line-height: 1.5; }

    .ai-panel { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
    .chat-msg { max-width: 90%; padding: 9px 12px; border-radius: 10px; font-size: 12.5px; line-height: 1.6; }
    .chat-msg.user { align-self: flex-end; background: var(--accent); color: #0c0c0e; border-bottom-right-radius: 3px; font-weight: 500; }
    .chat-msg.assistant { align-self: flex-start; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
    .chat-msg.system-msg { align-self: center; font-size: 11px; color: var(--text3); background: none; padding: 2px 0; }
    .chat-input-area { padding: 10px 16px 14px; border-top: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
    .chat-input-row { display: flex; gap: 6px; }
    #chatInput { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; resize: none; height: 36px; }
    #chatInput:focus { border-color: var(--accent); }
    #chatInput::placeholder { color: var(--text3); }
    .send-btn { width: 36px; height: 36px; border-radius: var(--radius-sm); background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .send-btn:hover { opacity: 0.85; }
    .quick-prompts { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
    .quick-prompt { padding: 4px 9px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--text3); font-size: 11px; cursor: pointer; transition: all 0.12s; }
    .quick-prompt:hover { border-color: var(--accent); color: var(--accent); }

    .settings-panel { padding: 16px; }
    .settings-group { margin-bottom: 20px; }
    .settings-label { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
    .settings-field { margin-bottom: 10px; }
    .settings-field label { display: block; color: var(--text2); font-size: 12px; margin-bottom: 5px; }
    .settings-field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; outline: none; }
    .settings-field input:focus { border-color: var(--accent); }
    .save-btn { width: 100%; padding: 9px; background: var(--accent); border: none; border-radius: var(--radius-sm); color: #0c0c0e; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; cursor: pointer; }
    .save-btn:hover { opacity: 0.85; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px; }
    .stat-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 8px; text-align: center; }
    .stat-num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: var(--accent); display: block; }
    .stat-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
    .modal-overlay.hidden { display: none; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; width: 100%; max-width: 340px; }
    .modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; margin-bottom: 12px; }
    .modal textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; outline: none; resize: vertical; min-height: 80px; }
    .modal textarea:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 8px; margin-top: 12px; }
    .modal-btn { flex: 1; padding: 8px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; }
    .modal-btn.primary { background: var(--accent); border-color: var(--accent); color: #0c0c0e; font-weight: 600; }

    .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .keypoints { list-style: none; padding: 0; }
    .keypoints li { padding: 5px 0 5px 16px; position: relative; color: var(--text2); font-size: 12px; line-height: 1.5; border-bottom: 1px solid var(--surface3); }
    .keypoints li:last-child { border-bottom: none; }
    .keypoints li::before { content: "•"; position: absolute; left: 0; color: var(--accent); font-size: 16px; line-height: 1; }

    .panel { display: none; }
    .panel.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    #toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: var(--surface2); color: var(--text); padding: 7px 16px; border-radius: 20px; font-size: 12px; border: 1px solid var(--border); opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; z-index: 99999; }
    #toast.show { opacity: 1; }

    /* ── Inline outline ── */
    .card-outline-toggle { display: flex; align-items: center; gap: 5px; margin-top: 7px; padding: 3px 0; background: none; border: none; color: var(--text3); font-family: 'DM Sans', sans-serif; font-size: 11px; cursor: pointer; width: 100%; text-align: left; }
    .card-outline-toggle:hover { color: var(--accent); }
    .card-outline-toggle svg { transition: transform 0.2s; flex-shrink: 0; }
    .card-outline-toggle.open svg { transform: rotate(180deg); }
    .card-outline { display: none; margin-top: 6px; padding: 8px 10px; background: var(--surface3); border-radius: 6px; border-left: 2px solid var(--accent); }
    .card-outline.open { display: block; }
    .outline-section { margin-bottom: 8px; }
    .outline-section:last-child { margin-bottom: 0; }
    .outline-heading { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px; color: var(--text); margin-bottom: 3px; }
    .outline-points { list-style: none; padding: 0; }
    .outline-points li { color: var(--text2); font-size: 11px; line-height: 1.55; padding: 1px 0 1px 13px; position: relative; }
    .outline-points li::before { content: "•"; position: absolute; left: 0; color: var(--accent); }

    /* ── Light mode ── */
    body.light {
      --bg: #f5f5f7; --surface: #ffffff; --surface2: #ebebeb; --surface3: #e0e0e0;
      --border: #d0d0d0; --text: #111111; --text2: #444444; --text3: #888888;
      --accent: #4d7c00; --accent-dim: rgba(77,124,0,0.1); --accent-dim2: rgba(77,124,0,0.06);
      --red: #d93025; --yellow: #b45309; --blue: #1d6fa8;
    }
    /* Elements that use accent as a background — keep the original bright lime */
    body.light .logo-icon { background: #c8f55a; }
    body.light .tool-btn.primary { background: #c8f55a; border-color: #c8f55a; color: #0c0c0e; }
    body.light .tool-btn.primary:hover { opacity: 0.88; }
    body.light .chat-msg.user { background: #c8f55a; color: #0c0c0e; }
    body.light .send-btn { background: #c8f55a; }
    body.light .save-btn { background: #c8f55a; color: #0c0c0e; }
    body.light .modal-btn.primary { background: #c8f55a; border-color: #c8f55a; color: #0c0c0e; }
    body.light .spinner { border-top-color: #4d7c00; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0c0c0e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="logo-name">KnowledgeKeeper</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="themeToggleBtn" title="Toggle light/dark mode">
        <!-- Sun = shown in dark mode (click to go light) -->
        <svg id="themeIconSun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <!-- Moon = shown in light mode (click to go dark) -->
        <svg id="themeIconMoon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Search your knowledge…" autocomplete="off" />
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="library">Library</button>
  <button class="tab" data-tab="ai">AI Chat</button>
  <button class="tab" data-tab="settings">Settings</button>
</div>

<div class="toolbar" id="libraryToolbar">
  <button class="tool-btn primary" id="savePageBtn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    Save Page
  </button>
  <button class="tool-btn" id="highlightToggleBtn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    Highlight
  </button>
  <button class="tool-btn" id="addNoteBtn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>
    Note
  </button>
  <div class="color-swatch" id="colorSwatch" style="background:#FFE066" title="Highlight color"></div>
  <input type="color" id="colorPicker" style="display:none" value="#FFE066" />
</div>

<!-- LIBRARY -->
<div class="panel active" id="libraryPanel">
  <div class="content" id="itemsList"></div>
</div>

<!-- AI CHAT -->
<div class="panel" id="aiPanel">
  <div class="ai-panel">
    <div class="chat-messages" id="chatMessages">
      <div class="chat-msg system-msg">Ask anything about your saved knowledge</div>
    </div>
    <div class="chat-input-area">
      <div class="quick-prompts">
        <span class="quick-prompt" data-prompt="Summarize everything I've saved recently">Recent summary</span>
        <span class="quick-prompt" data-prompt="What are the key themes across my saved content?">Key themes</span>
        <span class="quick-prompt" data-prompt="What should I read next based on my interests?">What to read</span>
      </div>
      <div class="chat-input-row">
        <textarea id="chatInput" placeholder="Ask your knowledge base…" rows="1"></textarea>
        <button class="send-btn" id="sendBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#0c0c0e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="panel" id="settingsPanel">
  <div class="content">
    <div class="settings-panel">
      <div class="settings-group">
        <div class="settings-label">Groq API</div>
        <div class="settings-field">
          <label>API Key</label>
          <input type="password" id="apiKeyInput" placeholder="gsk_…" autocomplete="off" />
        </div>
        <button class="save-btn" id="saveSettingsBtn">Save Settings</button>
      </div>
      <div class="settings-group">
        <div class="settings-label">Stats</div>
        <div class="stats-row">
          <div class="stat-box"><span class="stat-num" id="statTotal">0</span><span class="stat-lbl">Total</span></div>
          <div class="stat-box"><span class="stat-num" id="statPages">0</span><span class="stat-lbl">Pages</span></div>
          <div class="stat-box"><span class="stat-num" id="statHighlights">0</span><span class="stat-lbl">Highlights</span></div>
        </div>
      </div>
      <div class="settings-group">
        <div class="settings-label">Danger Zone</div>
        <button class="tool-btn danger" id="clearAllBtn" style="width:100%;justify-content:center;padding:8px">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Clear All Data
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Note Modal -->
<div class="modal-overlay hidden" id="noteModal">
  <div class="modal">
    <p class="modal-title" id="noteModalTitle">Add Note</p>
    <textarea id="noteText" placeholder="Write your note…"></textarea>
    <div class="modal-actions">
      <button class="modal-btn" id="noteCancel">Cancel</button>
      <button class="modal-btn primary" id="noteSave">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="sidebar.js"></script>
</body>
</html>
